<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hinge Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400..900;1,8..60,400..700&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root{ --accent:#8b1f5e; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{background:#ffffff;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#161616;}

  .field-input{width:100%;border:1px solid #e3e3e3;border-radius:12px;
    padding:12px 14px;font-size:15px;font-family:'Hanken Grotesk',sans-serif;color:#161616;
    background:#fafafa;outline:none;transition:.18s;}
  .field-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(139,31,94,.08);}
  .gen-btn{transition:transform .15s, box-shadow .2s, opacity .2s;}
  .gen-btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 14px 28px -12px rgba(139,31,94,.55);}
  .gen-btn:not(:disabled):active{transform:translateY(0) scale(.98);}

  .chip{border:1px solid #e3e3e3;background:#fafafa;color:#3a3a3a;border-radius:999px;
    padding:8px 14px;font-size:13.5px;font-family:'Hanken Grotesk',sans-serif;cursor:pointer;
    transition:.15s;user-select:none;}
  .chip:hover{border-color:#c9a3b8;background:#fff;}
  .chip.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip-x{margin-left:6px;opacity:.8;font-weight:600;}

  /* mini scrolling demo (illustrative only) */
  @keyframes miniScroll{
    0%{transform:translateY(0);} 8%{transform:translateY(0);}
    92%{transform:translateY(-50%);} 100%{transform:translateY(-50%);}
  }
  .mini-scroller{animation:miniScroll 14s linear infinite;will-change:transform;}
  .mini-view:hover .mini-scroller{animation-play-state:paused;}

  /* drag + drop photo slots */
  .pslot.dragover{outline:2px dashed var(--accent);outline-offset:2px;}
  .pslot.dragging{opacity:.4;}

  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(7px)}}
  .arrow-wrap{animation:nudge 1.8s ease-in-out infinite;}
  @media(max-width:880px){.arrow-wrap{transform:rotate(90deg);margin:6px 0;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// URL of your image backend (server.js). Same-origin by default; change if hosted elsewhere.
const IMAGE_BACKEND = "http://localhost:8787";

const serif = "'Source Serif 4', Georgia, serif";
const sans = "'Hanken Grotesk', system-ui, sans-serif";
const ACCENT = "#8b1f5e";

// Hinge-style prompt questions used by the local sample generator.
const PROMPT_QS = [
  "The best way to ask me out is by",
  "My simple pleasures",
  "I go crazy for",
  "Together, we could",
  "My love language is",
  "A shower thought I recently had",
];

// Popular interest chips people can tap to add.
const POPULAR_INTERESTS = [
  "Live music", "Hiking", "Cooking", "Coffee", "Travel", "Reading",
  "Photography", "Yoga", "Running", "Art", "Wine", "Dogs",
  "Gaming", "Climbing", "Dancing", "Foodie", "Movies",
  "Artificial intelligence", "Cycling", "Thrifting",
];

// Build a charming sample profile locally from the user's inputs.
// (See note at bottom of file about the live AI version.)
function buildSampleProfile({ name, interests, style, extra }) {
  const hb = interests.filter((h) => h && h.trim());
  const hasInterests = hb.length > 0;
  const first = hb[0] || "good conversation";
  const second = hb[1] || "long walks";
  const third = hb[2] || "a spontaneous road trip";
  const styled = style.trim() || "effortless and a little classic";

  // Tailored answers when interests exist; clean generic ones when they don't.
  const tailored = [
    `Tell me the time and place. Skip the small talk — bonus points if it involves ${first.toLowerCase()}.`,
    `${second}, the first coffee of the day, and a wardrobe that's all ${styled.toLowerCase()}.`,
    `Anyone who can hold a real conversation about ${first.toLowerCase()} and still laugh at themselves.`,
    `Turn a slow Sunday into something good — I'll bring the ${third.toLowerCase()}, you bring the playlist.`,
    `Equal parts ${first.toLowerCase()} deep-dives and showing up exactly when I say I will.`,
  ];
  const generic = [
    `Tell me the time and place — I'm better in person than over text anyway.`,
    `A good coffee, a long walk, and a conversation that loses track of time.`,
    `Someone who's genuinely curious and can laugh at themselves.`,
    `Find the best hole-in-the-wall spot in town and make it our regular.`,
    `Showing up, being honest, and remembering the little things you mention.`,
  ];
  const base = hasInterests ? tailored : generic;
  const answers = base.concat([
    extra.trim()
      ? `Honestly? ${extra.trim().split(/[.!?]/)[0]}.`
      : `Ask me anything — I'm an open book.`,
  ]);

  const prompts = PROMPT_QS.slice(0, 5).map((q, i) => ({ q, a: answers[i] }));

  return {
    tagline: hasInterests
      ? `${name || "Someone"} — into ${hb.slice(0, 2).join(" & ")}.`
      : `${name || "Someone"} — here for something real.`,
    vitals: {
      age: "29",
      height: "5' 8\"",
      location: "Oakland, CA",
      job: hb.includes("Artificial intelligence")
        ? "AI researcher"
        : hasInterests
        ? `Into ${first.toLowerCase()}`
        : "Always up for a good plan",
    },
    prompts,
  };
}

function Label({ children, style }) {
  return (
    <div style={{ fontSize: 13, fontWeight: 600, color: "#3a3a3a", marginBottom: 8, letterSpacing: ".01em", ...style }}>
      {children}
    </div>
  );
}

function HingeGenerator() {
  const [name, setName] = useState("");
  const [photos, setPhotos] = useState([]); // up to 6 data URLs
  const [interests, setInterests] = useState([]); // selected interest strings
  const [customInterest, setCustomInterest] = useState("");
  const [style, setStyle] = useState("");
  const [shots, setShots] = useState([]);
  const [extra, setExtra] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [profile, setProfile] = useState(null);
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [zoneOver, setZoneOver] = useState(false);
  const [lightbox, setLightbox] = useState(null); // {src, n}
  const fileRef = useRef(null);
  const shotRef = useRef(null);

  const filledInterests = interests.length;
  const canGenerate = name.trim() && photos.length >= 1 && filledInterests === 5 && style.trim();

  function addPhotoFiles(files) {
    files.forEach((f) => {
      const r = new FileReader();
      r.onload = () => setPhotos((prev) => (prev.length >= 6 ? prev : [...prev, r.result]));
      r.readAsDataURL(f);
    });
  }
  function onPhoto(e) {
    addPhotoFiles(Array.from(e.target.files || []));
    e.target.value = ""; // allow re-selecting the same file
  }
  function removePhoto(i) {
    setPhotos((prev) => prev.filter((_, idx) => idx !== i));
  }

  const [enhancing, setEnhancing] = useState(false);
  const [enhanceError, setEnhanceError] = useState("");
  async function enhancePhotos() {
    if (photos.length < 1) { setEnhanceError("Upload a photo first."); return; }
    setEnhanceError("");
    setEnhancing(true);
    try {
      // Send the first uploaded photo (a data URL) to the backend as a file.
      const blob = await (await fetch(photos[0])).blob();
      const fd = new FormData();
      fd.append("photo", blob, "photo.png");
      fd.append("count", "5");
      const res = await fetch(IMAGE_BACKEND + "/api/enhance", { method: "POST", body: fd });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        throw new Error(j.error || ("Server returned " + res.status));
      }
      const { images } = await res.json();
      if (images && images.length) {
        // First enhanced = upgraded outfit version of photo 1; rest are new looks.
        setPhotos((prev) => [images[0], ...images.slice(1), ...prev.slice(1)].slice(0, 6));
      }
    } catch (e) {
      setEnhanceError(
        "Couldn't reach the image service. Make sure server.js is running and your OPENAI_API_KEY is set. (" + e.message + ")"
      );
    } finally {
      setEnhancing(false);
    }
  }
  function movePhoto(from, to) {
    setPhotos((prev) => {
      if (from == null || to == null || from === to || from >= prev.length) return prev;
      const next = prev.slice();
      const [moved] = next.splice(from, 1);
      next.splice(Math.min(to, next.length), 0, moved);
      return next;
    });
  }
  function onShots(e) {
    Array.from(e.target.files || []).forEach((f) => {
      const r = new FileReader();
      r.onload = () => setShots((prev) => [...prev, r.result]);
      r.readAsDataURL(f);
    });
  }
  function toggleInterest(label) {
    setInterests((prev) => {
      if (prev.includes(label)) return prev.filter((x) => x !== label);
      if (prev.length >= 5) return prev; // cap at 5
      return [...prev, label];
    });
  }
  function addCustomInterest() {
    const v = customInterest.trim();
    if (!v) return;
    setInterests((prev) => {
      if (prev.includes(v) || prev.length >= 5) return prev;
      return [...prev, v];
    });
    setCustomInterest("");
  }
  function removeInterest(label) {
    setInterests((prev) => prev.filter((x) => x !== label));
  }

  function generate() {
    setError("");

    // Only the name is required. Everything else falls back to generic content.
    if (!name.trim()) {
      window.alert("Please enter your name first.");
      return;
    }

    setLoading(true);
    setProfile(null);
    // Local generation (works anywhere). For the live AI version, see note at the
    // bottom of this file — that requires running inside the Claude artifact runtime.
    setTimeout(() => {
      try {
        setProfile(buildSampleProfile({ name, interests, style, extra }));
      } catch (e) {
        setError("Couldn't build that one — give it another tap.");
      } finally {
        setLoading(false);
      }
    }, 650);
  }

  return (
    <div style={{ minHeight: "100vh", background: "#fff", color: "#161616", padding: "44px 22px 80px" }}>
      <header style={{ textAlign: "center", marginBottom: 38 }}>
        <h1 style={{ fontFamily: serif, fontWeight: 900, fontSize: "clamp(40px,7vw,66px)", letterSpacing: "-1.4px", lineHeight: 0.95, margin: 0, fontVariationSettings: "'opsz' 60" }}>
          Hinge Generator
        </h1>
        <p style={{ color: "#6b6b6b", marginTop: 12, fontSize: 16 }}>
          Create a draft Hinge profile in 5 minutes. Either use your photos, or go shoot the photos in real life.
        </p>
      </header>

      <div style={{ maxWidth: 900, margin: "0 auto", background: "#faf7f9", border: "1px solid #f0e6ec", borderRadius: 28, padding: "26px 28px", boxShadow: "0 20px 50px -38px rgba(0,0,0,.3)" }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 18, alignItems: "center", justifyContent: "center" }}>
          <div style={{ flex: "1 1 360px", maxWidth: 500, color: "#555", fontSize: 15, lineHeight: 1.6 }}>
            <strong style={{ color: "#161616" }}>How it works:</strong> Enter your name, upload at least one
            photo (up to six), pick five interests, and describe your fashion style. Optionally drop in
            screenshots of your current Hinge app or any extra notes about yourself. The generator writes
            you a set of Hinge-style prompts and lays them out as a finished profile — like the one to the right.
          </div>

          {/* arrow */}
          <div className="arrow-wrap" style={{ flex: "0 0 auto" }}>
            <svg width="54" height="34" viewBox="0 0 64 40" fill="none">
              <path d="M2 20 H56" stroke={ACCENT} strokeWidth="3.5" strokeLinecap="round" />
              <path d="M42 7 L57 20 L42 33" stroke={ACCENT} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
            </svg>
          </div>

          {/* mini scrolling demo */}
          <MiniDemo />
        </div>
      </div>

      {/* TRY IT HERE */}
      <div style={{ textAlign: "center", margin: "30px auto 18px" }}>
        <div style={{ fontFamily: serif, fontWeight: 900, fontSize: "clamp(40px,7vw,66px)", letterSpacing: "-1.4px", lineHeight: 0.95, color: "#161616", fontVariationSettings: "'opsz' 60" }}>
          Try It Here
        </div>
        <div style={{ fontSize: 34, color: ACCENT, lineHeight: 1, marginTop: 6 }}>↓</div>
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "flex-start", justifyContent: "center" }}>
        {/* INPUT PANEL */}
        <div style={{ flex: "1 1 340px", maxWidth: 420, border: "1px solid #ededed", borderRadius: 22, padding: "26px 24px", boxShadow: "0 22px 50px -34px rgba(0,0,0,.3)" }}>
          <Label>Your name</Label>
          <input className="field-input" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Maya" />

          <Label style={{ marginTop: 20 }}>
            Your photos <span style={{ color: "#aaa", fontWeight: 400 }}>({photos.length}/6)</span>
          </Label>
          <div
            onClick={() => { if (photos.length < 6) fileRef.current && fileRef.current.click(); }}
            onDragOver={(e) => { e.preventDefault(); setZoneOver(true); }}
            onDragLeave={() => setZoneOver(false)}
            onDrop={(e) => {
              e.preventDefault(); setZoneOver(false);
              const files = Array.from(e.dataTransfer.files || []).filter((f) => f.type.startsWith("image/"));
              addPhotoFiles(files);
            }}
            style={{
              border: zoneOver ? `2px dashed ${ACCENT}` : "1.5px dashed #d6d6d6",
              background: zoneOver ? "#fdf4f9" : "#fafafa",
              borderRadius: 16, padding: photos.length ? 12 : "34px 16px",
              textAlign: "center", cursor: photos.length < 6 ? "pointer" : "default", transition: ".15s",
            }}
          >
            {photos.length === 0 ? (
              <div style={{ color: "#888" }}>
                <div style={{ fontSize: 30, marginBottom: 6 }}>📷</div>
                <div style={{ fontSize: 15, fontWeight: 600, color: "#555" }}>Drop at least 1 photo, up to 6</div>
                <div style={{ fontSize: 13, color: "#999", marginTop: 2 }}>tap or drag to drop</div>
              </div>
            ) : (
              <>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8 }}>
                  {photos.map((src, i) => {
                    const isDragging = dragIdx === i;
                    const isOver = overIdx === i && dragIdx !== null && dragIdx !== i;
                    return (
                      <div
                        key={i}
                        className={"pslot" + (isDragging ? " dragging" : "") + (isOver ? " dragover" : "")}
                        draggable
                        onClick={(e) => e.stopPropagation()}
                        onDragStart={() => setDragIdx(i)}
                        onDragEnd={() => { setDragIdx(null); setOverIdx(null); }}
                        onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); if (overIdx !== i) setOverIdx(i); }}
                        onDrop={(e) => { e.preventDefault(); e.stopPropagation(); movePhoto(dragIdx, i); setDragIdx(null); setOverIdx(null); }}
                        style={{
                          position: "relative", aspectRatio: "4/5", borderRadius: 10, overflow: "hidden",
                          border: "1px solid #e3e3e3", background: `center/cover no-repeat url(${src})`, cursor: "grab",
                        }}
                      >
                        <span style={{ position: "absolute", left: 5, top: 4, fontSize: 10, fontWeight: 700, color: "#fff", background: "rgba(0,0,0,.5)", borderRadius: 6, padding: "1px 6px" }}>{i + 1}</span>
                        <span
                          onClick={(e) => { e.stopPropagation(); removePhoto(i); }}
                          style={{ position: "absolute", top: 4, right: 4, width: 20, height: 20, borderRadius: "50%", background: "rgba(0,0,0,.55)", color: "#fff", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}
                        >✕</span>
                      </div>
                    );
                  })}
                  {photos.length < 6 && (
                    <div style={{ aspectRatio: "4/5", borderRadius: 10, border: "1.5px dashed #d6d6d6", display: "flex", alignItems: "center", justifyContent: "center", color: "#bbb", fontSize: 24 }}>＋</div>
                  )}
                </div>
                <div style={{ fontSize: 12, color: "#999", marginTop: 8 }}>tap to add more · drag to reorder</div>
              </>
            )}
          </div>
          <input ref={fileRef} type="file" accept="image/*" multiple onChange={onPhoto} style={{ display: "none" }} />

          {/* AI photo enhance (requires server.js running with your OpenAI key) */}
          <button
            onClick={enhancePhotos}
            disabled={enhancing || photos.length < 1}
            className="gen-btn"
            style={{ marginTop: 10, width: "100%", border: "1px solid " + ACCENT, borderRadius: 999, padding: "12px", fontSize: 14, fontWeight: 600, fontFamily: sans, color: enhancing || photos.length < 1 ? "#bbb" : ACCENT, background: "#fff", cursor: enhancing || photos.length < 1 ? "default" : "pointer" }}
          >
            {enhancing ? "Enhancing your photos…" : "✨ Enhance my photos with AI"}
          </button>
          {enhanceError && <div style={{ color: "#b3261e", fontSize: 12, marginTop: 8, lineHeight: 1.4 }}>{enhanceError}</div>}

          <Label style={{ marginTop: 20 }}>
            Select/Type 5 interests here <span style={{ color: filledInterests === 5 ? "#2e7d32" : "#aaa", fontWeight: 400 }}>({filledInterests}/5)</span>
          </Label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {POPULAR_INTERESTS.map((label) => {
              const sel = interests.includes(label);
              const atCap = filledInterests >= 5 && !sel;
              return (
                <span
                  key={label}
                  className={"chip" + (sel ? " sel" : "")}
                  onClick={() => toggleInterest(label)}
                  style={atCap ? { opacity: 0.4, cursor: "not-allowed" } : undefined}
                >
                  {label}
                </span>
              );
            })}
          </div>

          {/* custom entry */}
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <input
              className="field-input"
              value={customInterest}
              onChange={(e) => setCustomInterest(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addCustomInterest(); } }}
              placeholder={filledInterests >= 5 ? "5 interests added" : "Type your own here…"}
              disabled={filledInterests >= 5}
              style={{ flex: 1, opacity: filledInterests >= 5 ? 0.6 : 1 }}
            />
            <button
              onClick={addCustomInterest}
              disabled={!customInterest.trim() || filledInterests >= 5}
              style={{
                border: "1px solid #e3e3e3", borderRadius: 12, padding: "0 16px",
                background: customInterest.trim() && filledInterests < 5 ? "#fff" : "#f6f6f6",
                color: customInterest.trim() && filledInterests < 5 ? ACCENT : "#bbb",
                fontWeight: 600, fontFamily: sans,
                cursor: customInterest.trim() && filledInterests < 5 ? "pointer" : "default",
              }}
            >
              Add
            </button>
          </div>

          {/* selected interests (custom + popular) with remove */}
          {interests.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 12 }}>
              {interests.map((label) => (
                <span key={label} className="chip sel" onClick={() => removeInterest(label)}>
                  {label}<span className="chip-x">✕</span>
                </span>
              ))}
            </div>
          )}

          <Label style={{ marginTop: 20 }}>Your fashion style</Label>
          <input className="field-input" value={style} onChange={(e) => setStyle(e.target.value)} placeholder="e.g. classy" />

          <Label style={{ marginTop: 20 }}>
            Existing Hinge screenshots <span style={{ color: "#aaa", fontWeight: 400 }}>(optional)</span>
          </Label>
          <div onClick={() => shotRef.current && shotRef.current.click()}
            style={{ border: "1.5px dashed #d6d6d6", borderRadius: 14, padding: shots.length ? 8 : "20px 14px", textAlign: "center", cursor: "pointer", background: "#fafafa", color: "#888", fontSize: 14 }}>
            {shots.length
              ? <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
                  {shots.map((s, i) => <img key={i} src={s} alt={"shot " + (i + 1)} style={{ width: 54, height: 54, objectFit: "cover", borderRadius: 8 }} />)}
                  <span style={{ alignSelf: "center", fontSize: 13 }}>+ add more</span>
                </div>
              : <span>🖼️ Tap to add screenshots</span>}
          </div>
          <input ref={shotRef} type="file" accept="image/*" multiple onChange={onShots} style={{ display: "none" }} />

          <Label style={{ marginTop: 20 }}>
            Extra text about you <span style={{ color: "#aaa", fontWeight: 400 }}>(optional)</span>
          </Label>
          <textarea className="field-input" value={extra} onChange={(e) => setExtra(e.target.value)} rows={3}
            placeholder="Paste any text from your current Hinge profile, or anything else you'd want a match to know."
            style={{ resize: "vertical", fontFamily: sans }} />

          <button className="gen-btn" disabled={loading} onClick={generate}
            style={{ marginTop: 26, width: "100%", border: "none", borderRadius: 999, padding: "15px", fontSize: 16, fontWeight: 600, fontFamily: sans, color: "#fff", background: ACCENT, cursor: loading ? "default" : "pointer", opacity: loading ? 0.7 : 1 }}>
            {loading ? "Writing your profile…" : "Generate profile"}
          </button>
          {error && <div style={{ color: "#b3261e", fontSize: 13, marginTop: 10 }}>{error}</div>}
        </div>

        {/* ARROW */}
        <div className="arrow-wrap" style={{ flex: "0 0 auto", padding: "0 6px", marginTop: 220 }}>
          <svg width="64" height="40" viewBox="0 0 64 40" fill="none">
            <path d="M2 20 H56" stroke={ACCENT} strokeWidth="3.5" strokeLinecap="round" />
            <path d="M42 7 L57 20 L42 33" stroke={ACCENT} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </svg>
        </div>

        {/* PHONE */}
        <Phone name={name || "Your name"} photos={photos} profile={profile} loading={loading} onPhotoClick={(src, n) => setLightbox({ src, n })} />
      </div>

      {/* LIGHTBOX */}
      {lightbox && (
        <div
          onClick={() => setLightbox(null)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.82)", zIndex: 100, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}
        >
          <img
            src={lightbox.src}
            alt={"photo " + lightbox.n}
            onClick={(e) => e.stopPropagation()}
            style={{ maxWidth: "min(92vw,520px)", maxHeight: "76vh", objectFit: "contain", borderRadius: 14, boxShadow: "0 30px 80px rgba(0,0,0,.6)" }}
          />
          <div style={{ display: "flex", gap: 12, marginTop: 18 }} onClick={(e) => e.stopPropagation()}>
            <a
              href={lightbox.src}
              download={"hinge-photo-" + lightbox.n + ".jpg"}
              style={{ background: ACCENT, color: "#fff", textDecoration: "none", fontWeight: 600, fontFamily: sans, padding: "12px 22px", borderRadius: 999, fontSize: 15 }}
            >
              ↓ Download
            </a>
            <button
              onClick={() => setLightbox(null)}
              style={{ background: "rgba(255,255,255,.15)", color: "#fff", border: "1px solid rgba(255,255,255,.4)", fontWeight: 600, fontFamily: sans, padding: "12px 22px", borderRadius: 999, fontSize: 15, cursor: "pointer" }}
            >
              Close
            </button>
          </div>
          <div style={{ color: "rgba(255,255,255,.6)", fontSize: 12, marginTop: 12 }}>
            Tip: you can also right-click the image and choose “Save image as…”
          </div>
        </div>
      )}
    </div>
  );
}

function Phone({ name, photos, profile, loading, onPhotoClick }) {
  return (
    <div style={{ flex: "0 0 300px", width: 300, background: "#fff", borderRadius: 30, border: "10px solid #111", overflow: "hidden", boxShadow: "0 30px 70px -30px rgba(0,0,0,.45)", position: "relative", paddingBottom: 16 }}>
      <div style={{ height: 30, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 16px", fontSize: 12, fontWeight: 600 }}>
        <span>11:53</span><span style={{ letterSpacing: -1 }}>▂▄▆ 📶 🔋</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 16px 8px" }}>
        <span style={{ color: ACCENT, fontSize: 14 }}>Cancel</span>

      <div>
        {loading && <div style={{ padding: 22, color: "#999", fontSize: 14 }}>Writing your profile…</div>}
        {!loading && <ProfileBody name={name} photos={photos} profile={profile} onPhotoClick={onPhotoClick} />}
      </div>

      <div style={{ height: 10 }} />
      <div style={{ position: "absolute", bottom: 7, left: "50%", transform: "translateX(-50%)", width: 90, height: 4, borderRadius: 3, background: "#111", opacity: 0.85, zIndex: 3 }} />
    </div>
  );
}

function PhotoSlot({ src, n, onPhotoClick }) {
  return (
    <div
      onClick={() => { if (src && onPhotoClick) onPhotoClick(src, n); }}
      style={{ width: "100%", aspectRatio: "1/1.05", background: src ? `center/cover no-repeat url(${src})` : "#fff", borderTop: src ? "none" : "1px solid #f0f0f0", borderBottom: src ? "none" : "1px solid #f0f0f0", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#fff", cursor: src ? "zoom-in" : "default", position: "relative" }}
    >
      {!src && (
        <span style={{ fontFamily: serif, fontSize: 34, fontWeight: 800, letterSpacing: "1px", color: "#d4d4d4", fontVariationSettings: "'opsz' 60" }}>photo</span>
      )}
      {src && (
        <span style={{ position: "absolute", bottom: 8, right: 8, background: "rgba(0,0,0,.5)", color: "#fff", fontSize: 11, padding: "3px 8px", borderRadius: 20 }}>
          ⤢ tap to enlarge
        </span>
      )}
    </div>
  );
}

function PromptCard({ q, a }) {
  return (
    <div style={{ padding: "18px 18px 20px", borderTop: "1px solid #f0f0f0" }}>
      <div style={{ fontSize: 13, color: "#3a3a3a", marginBottom: 9 }}>{q}</div>
      <div style={{ fontFamily: serif, fontSize: 20, lineHeight: 1.28, fontWeight: 800, letterSpacing: "-.3px", fontVariationSettings: "'opsz' 60" }}>{a}</div>
    </div>
  );
}

// Placeholder prompt questions shown in the empty outline (before generating).
const OUTLINE_PROMPTS = [
  { q: "The best way to ask me out is by", a: "Your answer will appear here…" },
  { q: "My simple pleasures", a: "Your answer will appear here…" },
  { q: "Together, we could", a: "Your answer will appear here…" },
];

function ProfileBody({ name, photos, profile, onPhotoClick }) {
  // Always show 6 photo slots and 3 prompts, interleaved like the real Hinge layout.
  const pics = [0, 1, 2, 3, 4, 5].map((i) => (photos && photos[i]) || null);
  const generated = !!(profile && profile.prompts);
  const prompts = generated ? profile.prompts.slice(0, 3) : OUTLINE_PROMPTS;
  const v = (profile && profile.vitals) || { age: "—", height: `—`, location: "Location", job: "Your headline" };
  const ghost = !generated; // dim the placeholder text

  const Pc = (p) => (
    <div style={{ padding: "18px 18px 20px", borderTop: "1px solid #f0f0f0" }}>
      <div style={{ fontSize: 13, color: "#3a3a3a", marginBottom: 9 }}>{p.q}</div>
      <div style={{ fontFamily: serif, fontSize: 20, lineHeight: 1.28, fontWeight: 800, letterSpacing: "-.3px", fontVariationSettings: "'opsz' 60", color: ghost ? "#cfcfcf" : "#161616" }}>
        {p.a}
      </div>
    </div>
  );

  return (
    <div>
      {/* Photo 1 */}
      <PhotoSlot src={pics[0]} n={1} onPhotoClick={onPhotoClick} />

      {/* Vitals */}
      <div style={{ padding: "14px 18px 4px" }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "8px 14px", fontSize: 13.5, color: ghost ? "#c4c4c4" : "#1c1c1c", paddingBottom: 8 }}>
          <span>◍ {v.age}</span>
          <span>▯ {v.height}</span>
          <span>📍 {v.location}</span>
        </div>
        {v.job && (
          <div style={{ fontSize: 14, color: ghost ? "#c4c4c4" : "#1c1c1c", padding: "12px 0", borderTop: "1px solid #f0f0f0", display: "flex", gap: 10 }}>
            <span style={{ opacity: 0.6 }}>✦</span>{v.job}
          </div>
        )}
      </div>

      {/* Prompt 1 */}
      {Pc(prompts[0])}
      {/* Photo 2 */}
      <PhotoSlot src={pics[1]} n={2} onPhotoClick={onPhotoClick} />
      {/* Prompt 2 */}
      {Pc(prompts[1])}
      {/* Photo 3 */}
      <PhotoSlot src={pics[2]} n={3} onPhotoClick={onPhotoClick} />
      {/* Photo 4 */}
      <PhotoSlot src={pics[3]} n={4} onPhotoClick={onPhotoClick} />
      {/* Prompt 3 */}
      {Pc(prompts[2])}
      {/* Photo 5 */}
      <PhotoSlot src={pics[4]} n={5} onPhotoClick={onPhotoClick} />
      {/* Photo 6 */}
      <PhotoSlot src={pics[5]} n={6} onPhotoClick={onPhotoClick} />
    </div>
  );
}
