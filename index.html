<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hinge Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400..900;1,8..60,400..700&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root{ --accent:#8b1f5e; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{background:#ffffff;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#161616;}

  .field-input{width:100%;border:1px solid #e3e3e3;border-radius:12px;
    padding:12px 14px;font-size:15px;font-family:'Hanken Grotesk',sans-serif;color:#161616;
    background:#fafafa;outline:none;transition:.18s;}
  .field-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(139,31,94,.08);}
  .gen-btn{transition:transform .15s, box-shadow .2s, opacity .2s;}
  .gen-btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 14px 28px -12px rgba(139,31,94,.55);}
  .gen-btn:not(:disabled):active{transform:translateY(0) scale(.98);}

  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(7px)}}
  .arrow-wrap{animation:nudge 1.8s ease-in-out infinite;}
  @media(max-width:880px){.arrow-wrap{transform:rotate(90deg);margin:6px 0;}}

  /* auto-scrolling hinge profile */
  @keyframes hingeScroll{
    0%{transform:translateY(0);}
    8%{transform:translateY(0);}
    92%{transform:translateY(-50%);}
    100%{transform:translateY(-50%);}
  }
  .hinge-scroller{animation:hingeScroll 22s linear infinite;will-change:transform;}
  .hinge-viewport:hover .hinge-scroller{animation-play-state:paused;}
  @media(prefers-reduced-motion:reduce){
    .hinge-scroller{animation:none;}
    .hinge-viewport{overflow-y:auto;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

const serif = "'Source Serif 4', Georgia, serif";
const sans = "'Hanken Grotesk', system-ui, sans-serif";
const ACCENT = "#8b1f5e";

// Hinge-style prompt questions used by the local sample generator.
const PROMPT_QS = [
  "The best way to ask me out is by",
  "My simple pleasures",
  "I go crazy for",
  "Together, we could",
  "My love language is",
  "A shower thought I recently had",
];

// Build a charming sample profile locally from the user's inputs.
// (See note at bottom of file about the live AI version.)
function buildSampleProfile({ name, interests, style, extra }) {
  const hb = interests.filter((h) => h.trim());
  const first = hb[0] || "good conversation";
  const second = hb[1] || "long walks";
  const third = hb[2] || "trying new things";
  const styled = style.trim() || "my own thing";

  const answers = [
    `Tell me the time and place. Skip the small talk — bonus points if it involves ${first.toLowerCase()}.`,
    `${second}, the first coffee of the day, and a wardrobe that's all ${styled.toLowerCase()}.`,
    `Anyone who can hold a real conversation about ${first.toLowerCase()} and still laugh at themselves.`,
    `Turn a slow Sunday into something good — I'll bring the ${third.toLowerCase()}, you bring the playlist.`,
    `Equal parts ${first.toLowerCase()} deep-dives and showing up exactly when I say I will.`,
    extra.trim()
      ? `Honestly? ${extra.trim().split(/[.!?]/)[0]}.`
      : `If ${first.toLowerCase()} ever becomes sentient, I'm taking full credit.`,
  ];

  const prompts = PROMPT_QS.slice(0, 5).map((q, i) => ({ q, a: answers[i] }));

  return {
    tagline: `${name || "Someone"} — into ${hb.slice(0, 2).join(" & ") || "lots of things"}.`,
    vitals: {
      age: "29",
      height: "5' 8\"",
      location: "Oakland, CA",
      job: hb.includes("Artificial intelligence")
        ? "AI researcher"
        : `Into ${first.toLowerCase()}`,
    },
    prompts,
  };
}

function Label({ children, style }) {
  return (
    <div style={{ fontSize: 13, fontWeight: 600, color: "#3a3a3a", marginBottom: 8, letterSpacing: ".01em", ...style }}>
      {children}
    </div>
  );
}

function HingeGenerator() {
  const [name, setName] = useState("");
  const [photo, setPhoto] = useState(null);
  const [interests, setInterests] = useState(["Artificial intelligence", "", "", "", ""]);
  const [style, setStyle] = useState("");
  const [shots, setShots] = useState([]);
  const [extra, setExtra] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [profile, setProfile] = useState(null);
  const fileRef = useRef(null);
  const shotRef = useRef(null);

  const filledInterests = interests.filter((h) => h.trim()).length;
  const canGenerate = name.trim() && filledInterests >= 1 && style.trim();

  function onPhoto(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => setPhoto(r.result);
    r.readAsDataURL(f);
  }
  function onShots(e) {
    Array.from(e.target.files || []).forEach((f) => {
      const r = new FileReader();
      r.onload = () => setShots((prev) => [...prev, r.result]);
      r.readAsDataURL(f);
    });
  }
  function setInterest(i, v) {
    setInterests((prev) => prev.map((h, idx) => (idx === i ? v : h)));
  }

  function generate() {
    setError("");
    setLoading(true);
    setProfile(null);
    // Local generation (works anywhere). For the live AI version, see note at the
    // bottom of this file — that requires running inside the Claude artifact runtime.
    setTimeout(() => {
      try {
        setProfile(buildSampleProfile({ name, interests, style, extra }));
      } catch (e) {
        setError("Couldn't build that one — give it another tap.");
      } finally {
        setLoading(false);
      }
    }, 650);
  }

  return (
    <div style={{ minHeight: "100vh", background: "#fff", color: "#161616", padding: "44px 22px 80px" }}>
      <header style={{ textAlign: "center", marginBottom: 38 }}>
        <h1 style={{ fontFamily: serif, fontWeight: 900, fontSize: "clamp(40px,7vw,66px)", letterSpacing: "-1.4px", lineHeight: 0.95, margin: 0, fontVariationSettings: "'opsz' 60" }}>
          Hinge Generator
        </h1>
        <p style={{ color: "#6b6b6b", marginTop: 12, fontSize: 16 }}>
          Drop in your details on the left — get a ready-made profile on the right.
        </p>
      </header>

      <div style={{ maxWidth: 720, margin: "0 auto 40px", textAlign: "center", color: "#555", fontSize: 15, lineHeight: 1.6 }}>
        <strong style={{ color: "#161616" }}>How it works:</strong> Enter your name, upload one photo,
        list five interests, and describe your fashion style. Optionally drop in screenshots of your
        current Hinge app or any extra notes about yourself. The generator writes you a set of
        Hinge-style prompts and lays them out as a profile that scrolls like the real app.
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", justifyContent: "center" }}>
        {/* INPUT PANEL */}
        <div style={{ flex: "1 1 340px", maxWidth: 420, border: "1px solid #ededed", borderRadius: 22, padding: "26px 24px", boxShadow: "0 22px 50px -34px rgba(0,0,0,.3)" }}>
          <Label>Your name</Label>
          <input className="field-input" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Maya" />

          <Label style={{ marginTop: 20 }}>One photo of you</Label>
          <div onClick={() => fileRef.current && fileRef.current.click()}
            style={{ border: "1.5px dashed #d6d6d6", borderRadius: 14, padding: photo ? 8 : "26px 14px", textAlign: "center", cursor: "pointer", background: "#fafafa", color: "#888", fontSize: 14 }}>
            {photo
              ? <img src={photo} alt="you" style={{ width: "100%", maxHeight: 200, objectFit: "cover", borderRadius: 9, display: "block" }} />
              : <span>📷 Tap to upload a photo</span>}
          </div>
          <input ref={fileRef} type="file" accept="image/*" onChange={onPhoto} style={{ display: "none" }} />

          <Label style={{ marginTop: 20 }}>
            Five interests <span style={{ color: "#aaa", fontWeight: 400 }}>({filledInterests}/5)</span>
          </Label>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {interests.map((h, i) => (
              <input key={i} className="field-input" value={h} onChange={(e) => setInterest(i, e.target.value)}
                placeholder={["Artificial intelligence", "Live music", "Pottery", "Hiking", "Cooking"][i]} />
            ))}
          </div>

          <Label style={{ marginTop: 20 }}>Your fashion style</Label>
          <input className="field-input" value={style} onChange={(e) => setStyle(e.target.value)} placeholder="e.g. vintage thrift meets clean minimalist" />

          <Label style={{ marginTop: 20 }}>
            Existing Hinge screenshots <span style={{ color: "#aaa", fontWeight: 400 }}>(optional)</span>
          </Label>
          <div onClick={() => shotRef.current && shotRef.current.click()}
            style={{ border: "1.5px dashed #d6d6d6", borderRadius: 14, padding: shots.length ? 8 : "20px 14px", textAlign: "center", cursor: "pointer", background: "#fafafa", color: "#888", fontSize: 14 }}>
            {shots.length
              ? <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
                  {shots.map((s, i) => <img key={i} src={s} alt={"shot " + (i + 1)} style={{ width: 54, height: 54, objectFit: "cover", borderRadius: 8 }} />)}
                  <span style={{ alignSelf: "center", fontSize: 13 }}>+ add more</span>
                </div>
              : <span>🖼️ Tap to add screenshots</span>}
          </div>
          <input ref={shotRef} type="file" accept="image/*" multiple onChange={onShots} style={{ display: "none" }} />

          <Label style={{ marginTop: 20 }}>
            Extra text about you <span style={{ color: "#aaa", fontWeight: 400 }}>(optional)</span>
          </Label>
          <textarea className="field-input" value={extra} onChange={(e) => setExtra(e.target.value)} rows={3}
            placeholder="Paste any text from your current Hinge profile, or anything else you'd want a match to know."
            style={{ resize: "vertical", fontFamily: sans }} />

          <button className="gen-btn" disabled={!canGenerate || loading} onClick={generate}
            style={{ marginTop: 26, width: "100%", border: "none", borderRadius: 999, padding: "15px", fontSize: 16, fontWeight: 600, fontFamily: sans, color: "#fff", background: canGenerate ? ACCENT : "#d9b8cb", cursor: canGenerate ? "pointer" : "not-allowed" }}>
            {loading ? "Writing your profile…" : "Generate profile"}
          </button>
          {error && <div style={{ color: "#b3261e", fontSize: 13, marginTop: 10 }}>{error}</div>}
        </div>

        {/* ARROW */}
        <div className="arrow-wrap" style={{ flex: "0 0 auto", padding: "0 6px" }}>
          <svg width="64" height="40" viewBox="0 0 64 40" fill="none">
            <path d="M2 20 H56" stroke={ACCENT} strokeWidth="3.5" strokeLinecap="round" />
            <path d="M42 7 L57 20 L42 33" stroke={ACCENT} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </svg>
        </div>

        {/* PHONE */}
        <Phone name={name || "Your name"} photo={photo} profile={profile} loading={loading} />
      </div>
    </div>
  );
}

function Phone({ name, photo, profile, loading }) {
  return (
    <div style={{ flex: "0 0 300px", width: 300, background: "#fff", borderRadius: 30, border: "10px solid #111", overflow: "hidden", boxShadow: "0 30px 70px -30px rgba(0,0,0,.45)", position: "relative", paddingBottom: 16 }}>
      <div style={{ height: 30, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 16px", fontSize: 12, fontWeight: 600 }}>
        <span>11:53</span><span style={{ letterSpacing: -1 }}>▂▄▆ 📶 🔋</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 16px 8px" }}>
        <span style={{ color: ACCENT, fontSize: 14 }}>Cancel</span>
        <span style={{ fontFamily: serif, fontWeight: 700, fontSize: 19, letterSpacing: "-.3px" }}>{name}</span>
        <span style={{ color: ACCENT, fontSize: 14 }}>Done</span>
      </div>
      <div style={{ display: "flex", textAlign: "center", fontSize: 13, paddingBottom: 8, color: "#aaa" }}>
        <div style={{ flex: 1 }}>Edit</div>
        <div style={{ flex: 1, color: "#161616", fontWeight: 600, borderBottom: "2px solid #161616", paddingBottom: 6, margin: "0 22px" }}>View</div>
      </div>

      <div className="hinge-viewport" style={{ height: 470, overflow: "hidden", position: "relative",
        maskImage: "linear-gradient(to bottom, transparent 0, #000 18px, #000 calc(100% - 14px), transparent 100%)",
        WebkitMaskImage: "linear-gradient(to bottom, transparent 0, #000 18px, #000 calc(100% - 14px), transparent 100%)" }}>
        {loading && <div style={{ padding: 22, color: "#999", fontSize: 14 }}>Writing your profile…</div>}
        {!loading && !profile && (
          <div style={{ padding: 22, color: "#bbb", fontSize: 14, lineHeight: 1.5 }}>
            Fill in the form and hit <em>Generate</em> — your scrolling profile will appear here.
          </div>
        )}
        {!loading && profile && (
          <div className="hinge-scroller">
            <ProfileBody name={name} photo={photo} profile={profile} />
            <ProfileBody name={name} photo={photo} profile={profile} ariaHidden />
          </div>
        )}
      </div>

      <div style={{ position: "absolute", bottom: 7, left: "50%", transform: "translateX(-50%)", width: 90, height: 4, borderRadius: 3, background: "#111", opacity: 0.85, zIndex: 3 }} />
    </div>
  );
}

function ProfileBody({ name, photo, profile, ariaHidden }) {
  return (
    <div aria-hidden={ariaHidden ? "true" : undefined}>
      <div style={{ width: "100%", aspectRatio: "1/1.05", background: photo ? `center/cover no-repeat url(${photo})` : "linear-gradient(150deg,#e9b894,#8b1f5e)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>
        {!photo && <span style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: ".06em", border: "1px solid rgba(255,255,255,.6)", padding: "6px 12px", borderRadius: 20 }}>your photo</span>}
      </div>

      {profile && profile.vitals && (
        <div style={{ padding: "14px 18px 4px" }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "8px 14px", fontSize: 13.5, color: "#1c1c1c", paddingBottom: 8 }}>
            {profile.vitals.age && <span>◍ {profile.vitals.age}</span>}
            {profile.vitals.height && <span>▯ {profile.vitals.height}</span>}
            {profile.vitals.location && <span>📍 {profile.vitals.location}</span>}
          </div>
          {profile.vitals.job && (
            <div style={{ fontSize: 14, color: "#1c1c1c", padding: "12px 0", borderTop: "1px solid #f0f0f0", display: "flex", gap: 10 }}>
              <span style={{ opacity: 0.6 }}>✦</span>{profile.vitals.job}
            </div>
          )}
        </div>
      )}

      {profile && profile.prompts && profile.prompts.map((p, i) => (
        <div key={i} style={{ padding: "18px 18px 20px", borderTop: "1px solid #f0f0f0" }}>
          <div style={{ fontSize: 13, color: "#3a3a3a", marginBottom: 9 }}>{p.q}</div>
          <div style={{ fontFamily: serif, fontSize: 20, lineHeight: 1.28, fontWeight: 800, letterSpacing: "-.3px", fontVariationSettings: "'opsz' 60" }}>{p.a}</div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HingeGenerator />);
</script>

<!--
  ───────────────────────────────────────────────────────────────────────────
  NOTE ON AI GENERATION
  This standalone HTML uses a built-in sample generator so it works anywhere
  (double-click, or host on GitHub Pages — no build step needed).

  The original version called Claude's API to WRITE the prompts in Hinge's
  voice. That call only works inside the Claude artifact runtime, not from a
  plain HTML file (no API key in the browser, and CORS blocks it). To use the
  live AI version, run the .jsx artifact inside Claude, or host this page on
  your own server that proxies the request with your API key.
  ───────────────────────────────────────────────────────────────────────────
-->
</body>
</html>
